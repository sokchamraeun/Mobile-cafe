<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>Brew & Bean | Coffee Shop</title>
  <!-- Tailwind CSS + Font Awesome Icons + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <!-- Custom Tailwind override for smoothness & coffee theme -->
  <style>
    * {
      font-family: 'Inter', sans-serif;
    }
    body {
      background: #fef7e8; /* cream background */
    }
    /* hide scrollbar but keep functionality for horizontal scroll */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* smooth slide-up drawer */
    .cart-drawer {
      transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      transform: translateY(100%);
    }
    .cart-drawer.open {
      transform: translateY(0);
    }
    /* bottom nav active indicator */
    .nav-active {
      color: #c47a2e;
      position: relative;
    }
    .nav-active i, .nav-active span {
      color: #c47a2e;
    }
    .card-hover {
      transition: all 0.2s ease;
    }
    .card-hover:active {
      transform: scale(0.98);
    }
    @media (min-width: 768px) {
      .card-hover:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 20px -12px rgba(0,0,0,0.2);
      }
    }
    button:active {
      transform: scale(0.96);
    }
    .sticky-cart-btn {
      transition: all 0.2s;
    }
    .sticky-cart-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body class="bg-[#fef7e8]">

  <!-- MAIN APP CONTAINER -->
  <div id="app" class="max-w-md mx-auto bg-[#fef7e8] shadow-xl relative min-h-screen flex flex-col">
    
    <!-- Sticky Header -->
    <header class="sticky top-0 z-30 bg-white/95 backdrop-blur-sm border-b border-amber-100 shadow-sm px-4 py-3 flex items-center justify-between gap-3">
      <!-- Logo + coffee icon -->
      <div class="flex items-center gap-2">
        <i class="fas fa-mug-hot text-2xl text-amber-700"></i>
        <h1 class="text-xl font-bold text-stone-800 tracking-tight">Brew<span class="text-amber-700">Bean</span></h1>
      </div>
      <!-- Search bar (inline on mobile) -->
      <div class="flex-1 max-w-[160px] md:max-w-[200px] relative">
        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-sm"></i>
        <input type="text" id="searchInput" placeholder="Search..." class="w-full pl-9 pr-3 py-2 rounded-full bg-stone-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-300 border-none">
      </div>
      <!-- Cart icon with badge -->
      <button id="headerCartBtn" class="relative p-2 rounded-full bg-amber-50 active:bg-amber-100 transition">
        <i class="fas fa-shopping-bag text-amber-700 text-xl"></i>
        <span id="cartBadge" class="absolute -top-1 -right-1 bg-amber-600 text-white text-[10px] font-bold rounded-full h-5 w-5 flex items-center justify-center">0</span>
      </button>
    </header>

    <!-- Main Content (dynamic views) -->
    <main id="mainContent" class="flex-1 pb-20 px-4 pt-3 overflow-y-auto">
      <!-- dynamic pages will be injected here -->
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white/95 backdrop-blur-md border-t border-amber-100 shadow-2xl rounded-t-2xl z-40">
      <div class="flex justify-around items-center py-2 px-2">
        <button data-nav="home" class="nav-item flex flex-col items-center gap-0.5 p-2 rounded-xl transition active:bg-amber-50">
          <i class="fas fa-home text-xl text-stone-600"></i>
          <span class="text-[11px] font-medium text-stone-600">Home</span>
        </button>
        <button data-nav="orders" class="nav-item flex flex-col items-center gap-0.5 p-2 rounded-xl transition active:bg-amber-50">
          <i class="fas fa-receipt text-xl text-stone-600"></i>
          <span class="text-[11px] font-medium text-stone-600">Orders</span>
        </button>
        <button data-nav="cart" class="nav-item flex flex-col items-center gap-0.5 p-2 rounded-xl transition active:bg-amber-50">
          <i class="fas fa-shopping-cart text-xl text-stone-600"></i>
          <span class="text-[11px] font-medium text-stone-600">Cart</span>
        </button>
        <button data-nav="profile" class="nav-item flex flex-col items-center gap-0.5 p-2 rounded-xl transition active:bg-amber-50">
          <i class="fas fa-user-circle text-xl text-stone-600"></i>
          <span class="text-[11px] font-medium text-stone-600">Profile</span>
        </button>
      </div>
    </nav>

    <!-- Slide-up Cart Drawer (mobile style) -->
    <div id="cartDrawer" class="cart-drawer fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white rounded-t-3xl shadow-2xl z-50 transition-transform duration-300 ease-out transform translate-y-full">
      <div class="p-5 pb-6 border-b border-amber-100 flex justify-between items-center">
        <h2 class="text-xl font-bold text-stone-800 flex items-center gap-2"><i class="fas fa-shopping-bag text-amber-600"></i> Your Cart</h2>
        <button id="closeDrawerBtn" class="text-stone-400 text-2xl">&times;</button>
      </div>
      <div id="drawerCartItems" class="max-h-[55vh] overflow-y-auto p-4 space-y-4"></div>
      <div class="p-5 border-t border-amber-100 bg-stone-50 rounded-b-3xl">
        <div class="flex justify-between text-stone-700 mb-2"><span>Subtotal</span><span id="drawerSubtotal">$0.00</span></div>
        <div class="flex justify-between font-bold text-stone-800 text-lg mb-4"><span>Total</span><span id="drawerTotal">$0.00</span></div>
        <button id="drawerCheckoutBtn" class="w-full bg-amber-700 hover:bg-amber-800 active:scale-98 transition text-white font-semibold py-3 rounded-2xl shadow-md flex items-center justify-center gap-2">Checkout <i class="fas fa-arrow-right"></i></button>
      </div>
    </div>
    <div id="drawerOverlay" class="fixed inset-0 bg-black/30 z-40 hidden transition-all"></div>

    <!-- Sticky Bottom Cart Button (visible when cart not empty) -->
    <button id="stickyCartBtn" class="sticky-cart-btn fixed bottom-20 right-4 z-30 bg-amber-700 text-white p-3 rounded-full shadow-lg flex items-center gap-2 px-5 hidden">
      <i class="fas fa-shopping-cart"></i>
      <span class="font-semibold">View Cart</span>
      <span id="stickyCartCount" class="bg-white text-amber-800 text-xs font-bold rounded-full px-2 py-0.5 ml-1">0</span>
    </button>
  </div>

  <script>
    // ---------- DATA ----------
    const products = [
      { id: 1, name: "Caramel Latte", price: 4.5, category: "Coffee", image: "https://images.unsplash.com/photo-1461023058943-07fcbe16d735?w=150&h=150&fit=crop", tag: "coffee" },
      { id: 2, name: "Cappuccino", price: 4.0, category: "Coffee", image: "https://images.unsplash.com/photo-1534778101976-62847782c213?w=150&h=150&fit=crop", tag: "coffee" },
      { id: 3, name: "Matcha Latte", price: 4.8, category: "Tea", image: "https://images.unsplash.com/photo-1534778101976-62847782c213?w=150&h=150&fit=crop", tag: "tea" },
      { id: 4, name: "Earl Grey Tea", price: 3.2, category: "Tea", image: "https://images.unsplash.com/photo-1594631252845-29fc4cc8cde9?w=150&h=150&fit=crop", tag: "tea" },
      { id: 5, name: "Iced Americano", price: 3.8, category: "Drinks", image: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=150&h=150&fit=crop", tag: "drinks" },
      { id: 6, name: "Strawberry Smoothie", price: 5.5, category: "Drinks", image: "https://images.unsplash.com/photo-1553530666-b14c90a1f7e4?w=150&h=150&fit=crop", tag: "drinks" },
      { id: 7, name: "Croissant", price: 3.5, category: "Snacks", image: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=150&h=150&fit=crop", tag: "snacks" },
      { id: 8, name: "Cheese Muffin", price: 3.9, category: "Snacks", image: "https://images.unsplash.com/photo-1608198093002-ad4e005484ec?w=150&h=150&fit=crop", tag: "snacks" },
      { id: 9, name: "Chocolate Cake", price: 5.2, category: "Dessert", image: "https://images.unsplash.com/photo-1578985545062-69928b1d9588?w=150&h=150&fit=crop", tag: "dessert" },
      { id: 10, name: "Cheesecake", price: 5.8, category: "Dessert", image: "https://images.unsplash.com/photo-1533134242443-d4fd215305ad?w=150&h=150&fit=crop", tag: "dessert" }
    ];

    // cart state: { id, quantity, name, price, image }
    let cart = [];
    // orders array
    let orders = [];

    // load from localStorage
    function loadData() {
      const storedCart = localStorage.getItem('coffee_cart');
      if(storedCart) cart = JSON.parse(storedCart);
      const storedOrders = localStorage.getItem('coffee_orders');
      if(storedOrders) orders = JSON.parse(storedOrders);
      updateAllBadges();
    }
    function saveCart() { localStorage.setItem('coffee_cart', JSON.stringify(cart)); updateAllBadges(); }
    function saveOrders() { localStorage.setItem('coffee_orders', JSON.stringify(orders)); }

    function updateAllBadges() {
      const totalItems = cart.reduce((sum, i) => sum + i.quantity, 0);
      document.getElementById('cartBadge').innerText = totalItems;
      const stickyCountSpan = document.getElementById('stickyCartCount');
      if(stickyCountSpan) stickyCountSpan.innerText = totalItems;
      const stickyBtn = document.getElementById('stickyCartBtn');
      if(stickyBtn) {
        if(totalItems > 0) stickyBtn.classList.remove('hidden');
        else stickyBtn.classList.add('hidden');
      }
      // also re-render drawer if open? we'll handle inside drawer open function
    }

    // cart helpers
    function addToCart(product, qty = 1) {
      const existing = cart.find(item => item.id === product.id);
      if(existing) existing.quantity += qty;
      else cart.push({ ...product, quantity: qty });
      saveCart();
      showToast("Added to cart", "success");
    }

    function updateCartItem(id, newQty) {
      if(newQty <= 0) {
        cart = cart.filter(item => item.id !== id);
      } else {
        const item = cart.find(i => i.id === id);
        if(item) item.quantity = newQty;
      }
      saveCart();
      if(document.getElementById('cartDrawer').classList.contains('open')) renderCartDrawer();
    }

    function removeCartItem(id) { cart = cart.filter(i => i.id !== id); saveCart(); if(document.getElementById('cartDrawer').classList.contains('open')) renderCartDrawer(); }

    function getCartTotals() {
      const subtotal = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);
      return { subtotal, total: subtotal };
    }

    // toast notification
    function showToast(msg, type = 'info') {
      let toast = document.createElement('div');
      toast.className = 'fixed bottom-24 left-4 right-4 max-w-md mx-auto bg-stone-800 text-white text-center py-2 px-4 rounded-full z-50 text-sm shadow-lg animate-bounce';
      toast.innerText = msg;
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    // render product grid based on category & search
    let activeCategory = "Coffee";
    let searchQuery = "";

    function renderProducts() {
      const container = document.getElementById('productsGrid');
      if(!container) return;
      let filtered = products.filter(p => p.category === activeCategory);
      if(searchQuery.trim() !== "") {
        filtered = filtered.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      }
      if(filtered.length === 0) {
        container.innerHTML = `<div class="col-span-2 text-center py-10 text-stone-400">No items found ☕</div>`;
        return;
      }
      container.innerHTML = filtered.map(product => `
        <div class="bg-white rounded-2xl shadow-md overflow-hidden card-hover transition-all">
          <img src="${product.image}" alt="${product.name}" class="w-full h-32 object-cover">
          <div class="p-3">
            <h3 class="font-semibold text-stone-800 text-base">${product.name}</h3>
            <div class="flex justify-between items-center mt-2">
              <span class="text-amber-700 font-bold">$${product.price.toFixed(2)}</span>
              <button data-id="${product.id}" data-name="${product.name}" data-price="${product.price}" data-image="${product.image}" class="add-to-cart-btn bg-amber-600 hover:bg-amber-700 text-white px-3 py-1.5 rounded-xl text-sm flex items-center gap-1 active:scale-95 transition"><i class="fas fa-plus"></i> Add</button>
            </div>
          </div>
        </div>
      `).join('');
      // attach add-to-cart events
      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          const product = products.find(p => p.id === id);
          if(product) addToCart(product);
        });
      });
    }

    // Categories horizontal scroll
    function renderCategories() {
      const cats = ["Coffee", "Tea", "Drinks", "Snacks", "Dessert"];
      const container = document.getElementById('categoriesList');
      if(!container) return;
      container.innerHTML = cats.map(cat => `
        <button data-cat="${cat}" class="category-btn px-5 py-2 rounded-full font-medium whitespace-nowrap transition-all ${activeCategory === cat ? 'bg-amber-700 text-white shadow-md' : 'bg-white text-stone-700 border border-amber-200'}">${cat}</button>
      `).join('');
      document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.cat;
          renderCategories();
          renderProducts();
        });
      });
    }

    // Home View
    function renderHome() {
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <!-- Horizontal Categories -->
        <div class="mb-5 overflow-x-auto no-scrollbar pb-2">
          <div id="categoriesList" class="flex gap-3"></div>
        </div>
        <!-- Products Grid 2 cols -->
        <div id="productsGrid" class="grid grid-cols-2 gap-4 pb-4"></div>
      `;
      renderCategories();
      renderProducts();
      // search listener dynamic
      const searchInput = document.getElementById('searchInput');
      const handler = () => { searchQuery = searchInput.value; renderProducts(); };
      searchInput.removeEventListener('input', handler);
      searchInput.addEventListener('input', handler);
    }

    // Cart Drawer render
    function renderCartDrawer() {
      const drawerItemsDiv = document.getElementById('drawerCartItems');
      if(!drawerItemsDiv) return;
      if(cart.length === 0) {
        drawerItemsDiv.innerHTML = `<div class="text-center py-8 text-stone-400"><i class="fas fa-shopping-cart text-4xl mb-2"></i><p>Your cart is empty</p></div>`;
        document.getElementById('drawerSubtotal').innerText = "$0.00";
        document.getElementById('drawerTotal').innerText = "$0.00";
        return;
      }
      drawerItemsDiv.innerHTML = cart.map(item => `
        <div class="flex gap-3 items-center bg-stone-50 p-3 rounded-2xl">
          <img src="${item.image}" class="w-14 h-14 rounded-xl object-cover">
          <div class="flex-1">
            <h4 class="font-semibold text-stone-800">${item.name}</h4>
            <p class="text-amber-700 text-sm">$${item.price}</p>
          </div>
          <div class="flex items-center gap-2 bg-white rounded-full border border-amber-200 px-2 py-1">
            <button data-id="${item.id}" data-delta="-1" class="cart-qty-btn text-amber-700 font-bold px-1">-</button>
            <span class="w-6 text-center font-medium">${item.quantity}</span>
            <button data-id="${item.id}" data-delta="1" class="cart-qty-btn text-amber-700 font-bold px-1">+</button>
          </div>
          <button data-id="${item.id}" class="remove-item text-stone-400 hover:text-red-500"><i class="fas fa-trash-alt"></i></button>
        </div>
      `).join('');
      const { subtotal, total } = getCartTotals();
      document.getElementById('drawerSubtotal').innerText = `$${subtotal.toFixed(2)}`;
      document.getElementById('drawerTotal').innerText = `$${total.toFixed(2)}`;
      document.querySelectorAll('.cart-qty-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          const delta = parseInt(btn.dataset.delta);
          const item = cart.find(i => i.id === id);
          if(item) updateCartItem(id, item.quantity + delta);
        });
      });
      document.querySelectorAll('.remove-item').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const id = parseInt(btn.dataset.id);
          removeCartItem(id);
        });
      });
    }

    function openDrawer() {
      renderCartDrawer();
      document.getElementById('cartDrawer').classList.add('open');
      document.getElementById('drawerOverlay').classList.remove('hidden');
      document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
      document.getElementById('cartDrawer').classList.remove('open');
      document.getElementById('drawerOverlay').classList.add('hidden');
      document.body.style.overflow = '';
    }

    // Checkout Page view
    let checkoutCartSnapshot = [];
    function renderCheckout() {
      if(cart.length === 0) { showToast("Cart empty, add items first"); closeDrawer(); renderHome(); setActiveNav('home'); return; }
      checkoutCartSnapshot = JSON.parse(JSON.stringify(cart));
      const main = document.getElementById('mainContent');
      const { total } = getCartTotals();
      main.innerHTML = `
        <div class="pb-8">
          <h2 class="text-2xl font-bold text-stone-800 mb-4 flex items-center gap-2"><i class="fas fa-clipboard-list text-amber-600"></i> Checkout</h2>
          <div class="bg-white rounded-2xl p-4 shadow-sm mb-5">
            <h3 class="font-semibold text-stone-700 mb-2">Order Summary</h3>
            ${checkoutCartSnapshot.map(item => `<div class="flex justify-between text-sm py-1"><span>${item.name} x${item.quantity}</span><span>$${(item.price * item.quantity).toFixed(2)}</span></div>`).join('')}
            <div class="border-t mt-2 pt-2 flex justify-between font-bold"><span>Total</span><span>$${total.toFixed(2)}</span></div>
          </div>
          <div class="bg-white rounded-2xl p-4 shadow-sm mb-5">
            <label class="block font-medium text-stone-700 mb-1">Table Number</label>
            <input type="number" id="tableNumber" class="w-full border border-amber-200 rounded-xl px-4 py-2 mb-3" placeholder="e.g., 5" value="1">
            <label class="block font-medium text-stone-700 mb-1">Service Type</label>
            <select id="serviceType" class="w-full border border-amber-200 rounded-xl px-4 py-2 mb-3">
              <option value="Dine In">Dine In</option>
              <option value="Takeaway">Takeaway</option>
            </select>
            <label class="block font-medium text-stone-700 mb-1">Payment Method</label>
            <div class="flex gap-3 mt-1">
              <label class="flex items-center gap-1"><input type="radio" name="payment" value="Cash" checked> Cash</label>
              <label class="flex items-center gap-1"><input type="radio" name="payment" value="Card"> Card</label>
              <label class="flex items-center gap-1"><input type="radio" name="payment" value="QR"> QR</label>
            </div>
          </div>
          <button id="placeOrderBtn" class="w-full bg-amber-700 text-white py-3 rounded-2xl font-bold text-lg shadow-md active:scale-98 transition">Place Order</button>
        </div>
      `;
      document.getElementById('placeOrderBtn').addEventListener('click', () => {
        const table = document.getElementById('tableNumber').value;
        const service = document.getElementById('serviceType').value;
        const payment = document.querySelector('input[name="payment"]:checked').value;
        if(!table) { showToast("Table number required"); return; }
        const orderId = 'ORD' + Math.floor(Math.random() * 10000);
        const newOrder = {
          id: orderId,
          items: checkoutCartSnapshot,
          total: total,
          table: table,
          service: service,
          payment: payment,
          timestamp: new Date().toLocaleString()
        };
        orders.unshift(newOrder);
        saveOrders();
        // clear cart
        cart = [];
        saveCart();
        closeDrawer();
        renderOrderSuccess(orderId, total);
        setActiveNav('orders'); // go to orders view after success
      });
    }

    function renderOrderSuccess(orderId, totalPrice) {
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div class="flex flex-col items-center justify-center min-h-[70vh] text-center p-6">
          <div class="bg-white rounded-3xl p-8 shadow-xl w-full">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fas fa-check-circle text-green-600 text-4xl"></i></div>
            <h2 class="text-2xl font-bold text-stone-800">Order Confirmed!</h2>
            <p class="text-stone-500 mt-1">Thank you for your order</p>
            <div class="bg-amber-50 rounded-xl p-4 my-5">
              <p class="text-sm text-stone-600">Order Number</p>
              <p class="font-mono text-xl font-bold text-amber-800">${orderId}</p>
              <p class="text-sm mt-2">Total: <span class="font-bold">$${totalPrice.toFixed(2)}</span></p>
            </div>
            <button id="doneBtn" class="w-full bg-amber-700 text-white py-3 rounded-xl font-semibold">Done</button>
            <button id="printBtn" class="w-full mt-3 border border-amber-300 text-amber-800 py-2 rounded-xl font-medium">Print Receipt</button>
          </div>
        </div>
      `;
      document.getElementById('doneBtn').addEventListener('click', () => { renderHome(); setActiveNav('home'); });
      document.getElementById('printBtn').addEventListener('click', () => { alert(`Receipt: Order ${orderId} | Total $${totalPrice.toFixed(2)}`); });
    }

    // Orders page
    function renderOrders() {
      const main = document.getElementById('mainContent');
      if(orders.length === 0) {
        main.innerHTML = `<div class="text-center py-16 text-stone-400"><i class="fas fa-receipt text-5xl mb-3"></i><p>No past orders</p></div>`;
        return;
      }
      main.innerHTML = `<h2 class="text-xl font-bold mb-4 text-stone-800">📋 Your Orders</h2><div class="space-y-4">` + orders.map(order => `
        <div class="bg-white rounded-2xl p-4 shadow-sm">
          <div class="flex justify-between"><span class="font-mono font-bold">${order.id}</span><span class="text-amber-700">${order.timestamp}</span></div>
          <div class="mt-2 text-sm">${order.items.map(i=>`${i.name} x${i.quantity}`).join(', ')}</div>
          <div class="flex justify-between mt-2"><span>${order.service} | Table ${order.table}</span><span class="font-bold">$${order.total.toFixed(2)}</span></div>
        </div>
      `).join('') + `</div>`;
    }

    function renderProfile() {
      const main = document.getElementById('mainContent');
      main.innerHTML = `
        <div class="flex flex-col items-center pt-6">
          <div class="w-28 h-28 bg-amber-200 rounded-full flex items-center justify-center text-5xl text-amber-800"><i class="fas fa-user-alt"></i></div>
          <h2 class="text-2xl font-bold mt-3">Coffee Lover</h2>
          <p class="text-stone-500">Member since 2025</p>
          <div class="w-full bg-white rounded-2xl p-5 mt-6 shadow-sm">
            <div class="flex justify-between py-2"><span>Total Orders</span><span class="font-bold">${orders.length}</span></div>
            <div class="flex justify-between py-2"><span>Favorite Drink</span><span>Caramel Latte</span></div>
          </div>
          <button id="clearHistoryBtn" class="mt-6 text-red-500 text-sm">Clear Order History</button>
        </div>
      `;
      document.getElementById('clearHistoryBtn')?.addEventListener('click', () => { orders = []; saveOrders(); renderProfile(); showToast("History cleared"); });
    }

    // navigation handler
    let currentNav = 'home';
    function setActiveNav(nav) {
      currentNav = nav;
      document.querySelectorAll('.nav-item').forEach(btn => {
        const navVal = btn.dataset.nav;
        if(navVal === nav) {
          btn.classList.add('nav-active');
          btn.querySelector('i')?.classList.add('text-amber-700');
          btn.querySelector('span')?.classList.add('text-amber-700');
        } else {
          btn.classList.remove('nav-active');
          btn.querySelector('i')?.classList.remove('text-amber-700');
          btn.querySelector('span')?.classList.remove('text-amber-700');
          btn.querySelector('i')?.classList.add('text-stone-600');
          btn.querySelector('span')?.classList.add('text-stone-600');
        }
      });
      if(nav === 'home') renderHome();
      if(nav === 'orders') renderOrders();
      if(nav === 'cart') { openDrawer(); setActiveNav(currentNav); }
      if(nav === 'profile') renderProfile();
    }

    // event binding
    function bindEvents() {
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.addEventListener('click', (e) => { setActiveNav(btn.dataset.nav); closeDrawer(); });
      });
      document.getElementById('headerCartBtn').addEventListener('click', () => { openDrawer(); setActiveNav('cart'); });
      document.getElementById('closeDrawerBtn').addEventListener('click', closeDrawer);
      document.getElementById('drawerOverlay').addEventListener('click', closeDrawer);
      document.getElementById('stickyCartBtn').addEventListener('click', openDrawer);
      document.getElementById('drawerCheckoutBtn').addEventListener('click', () => { closeDrawer(); renderCheckout(); setActiveNav('home'); document.getElementById('searchInput').value = ''; });
    }

    function init() {
      loadData();
      bindEvents();
      setActiveNav('home');
    }
    init();
  </script>
</body>
</html>
